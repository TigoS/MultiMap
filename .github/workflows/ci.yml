name: ci

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  build-test-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: Restore
        run: dotnet restore MultiMap/MultiMap.csproj && dotnet restore MultiMap.Tests/MultiMap.Tests.csproj && dotnet restore MultiMap.Demo/MultiMap.Demo.csproj && dotnet restore BenchmarkSuite/BenchmarkSuite.csproj

      - name: Build
        run: dotnet build MultiMap/MultiMap.csproj -c Release --no-restore && dotnet build MultiMap.Tests/MultiMap.Tests.csproj -c Release --no-restore && dotnet build MultiMap.Demo/MultiMap.Demo.csproj -c Release --no-restore && dotnet build BenchmarkSuite/BenchmarkSuite.csproj -c Release --no-restore

      - name: Test
        run: dotnet test MultiMap.Tests/MultiMap.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Pack
        run: dotnet pack MultiMap/MultiMap.csproj -c Release --no-build -o ./artifacts

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*.nupkg
